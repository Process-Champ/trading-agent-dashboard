name: Trading Agent

on:
  schedule:
    - cron: "15,30,45 3 * * 1-5"
    - cron: "0,15,30,45 4 * * 1-5"
    - cron: "0,15,30,45 5 * * 1-5"
    - cron: "0,15,30,45 6 * * 1-5"
    - cron: "0,15,30,45 7 * * 1-5"
    - cron: "0,15,30,45 8 * * 1-5"
    - cron: "0,15,30,45 9 * * 1-5"
    - cron: "0,15,30 10 * * 1-5"

  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading agent
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
        run: python agent.py
